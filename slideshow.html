<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票交易戰術指南 · 投影片</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E2E8F0; --grid:#D2DCE8; --surface:rgba(255,255,255,0.80);
    --ink:#2C3A4A; --muted:#7A8EA6; --hairline:#BEC9D6;
    --brand:#6A8DAB; --brand-ink:#456882; --brand-soft:#D3E3EE;
    --shadow:0 1px 3px rgba(44,58,74,.06),0 14px 36px -10px rgba(44,58,74,.16);
    --slide-bg:#18192C;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%; font-family:"Inter",system-ui,"Noto Sans TC",sans-serif;
    color:var(--ink); -webkit-font-smoothing:antialiased;
    background-color:var(--bg);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:28px 28px; background-attachment:fixed;
  }

  /* ── Top bar ── */
  .topbar{
    display:flex; align-items:center; gap:16px;
    padding:14px 24px; background:var(--surface);
    border-bottom:1px solid var(--hairline);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    position:sticky; top:0; z-index:20;
  }
  .back-btn{
    display:inline-flex; align-items:center; gap:7px;
    font-family:"JetBrains Mono",monospace; font-size:12px;
    color:var(--brand-ink); text-decoration:none; letter-spacing:.04em;
    padding:6px 12px; border:1px solid var(--hairline); border-radius:8px;
    background:var(--surface); transition:border-color .15s;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .back-btn:hover{ border-color:var(--brand); }
  .topbar-title{
    font-family:"Fraunces",serif; font-weight:500; font-size:18px;
    flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .counter-badge{ font-family:"JetBrains Mono",monospace; font-size:12.5px; color:var(--muted); white-space:nowrap; }

  /* ── Stage ── */
  .stage{ display:flex; flex-direction:column; align-items:center; padding:28px 24px 16px; }

  /* Slide container — fixed aspect ratio wrapper */
  .slide-wrap{ width:100%; max-width:900px; position:relative; user-select:none; }
  .slide-box{
    position:relative; width:100%; border-radius:12px; overflow:hidden;
    box-shadow:var(--shadow); border:1px solid var(--hairline);
    transition:opacity .22s ease;
    background:var(--slide-bg);
  }
  .slide-box.fading{ opacity:0; }
  .slide-img{ width:100%; height:auto; display:block; }

  /* ── Cover slide (slide 1) ── */
  .slide-cover{
    width:100%; border-radius:12px; overflow:hidden;
    box-shadow:var(--shadow); border:1px solid rgba(106,141,171,.18);
    aspect-ratio:1376/768; position:relative;
    display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
    padding:8% 10%;
    background-color:#1E2832;
    background-image:
      linear-gradient(rgba(106,141,171,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(106,141,171,.06) 1px, transparent 1px);
    background-size:34px 34px;
    color:#e6edf4;
    transition:opacity .22s ease;
  }
  .slide-cover.fading{ opacity:0; }
  .cov-eyebrow{
    font-family:"JetBrains Mono",monospace; font-size:clamp(9px,1vw,13px);
    letter-spacing:.18em; text-transform:uppercase; color:#6A8DAB;
    display:flex; align-items:center; gap:12px; margin-bottom:4%;
  }
  .cov-eyebrow::before{ content:""; display:inline-block; width:24px; height:2px; background:#6A8DAB; }
  .cov-title{
    font-family:"Noto Sans TC","Inter",sans-serif;
    font-size:clamp(26px,5.5vw,66px); font-weight:700;
    color:#e8edf4; line-height:1.1; margin-bottom:3%;
  }
  .cov-title em{ font-style:normal; color:#6A8DAB; }
  .cov-sub{
    font-family:"Inter","Noto Sans TC",sans-serif;
    font-size:clamp(10px,1.4vw,17px); color:#7A9BB8;
    max-width:50ch; line-height:1.7; margin-bottom:6%;
  }
  .cov-pills{ display:flex; gap:2%; flex-wrap:wrap; }
  .cov-pill{
    font-family:"JetBrains Mono",monospace; font-size:clamp(7px,0.8vw,10px);
    letter-spacing:.08em; padding:1.2% 2.8%;
    background:rgba(106,141,171,.12); border:1px solid rgba(106,141,171,.25);
    border-radius:20px; color:#7A9BB8; white-space:nowrap;
  }
  .cov-deco{
    position:absolute; right:7%; top:50%; transform:translateY(-50%);
    width:28%; opacity:.12; pointer-events:none;
  }
  .cov-corner{
    position:absolute; bottom:6%; right:8%;
    font-family:"JetBrains Mono",monospace; font-size:clamp(7px,0.75vw,9.5px);
    color:rgba(106,141,171,.45); letter-spacing:.12em; text-align:right;
  }

  /* HTML summary slide — Morandi blue, light & airy */
  .slide-html{
    width:100%; border-radius:12px; overflow:hidden;
    box-shadow:var(--shadow); border:1px solid var(--hairline);
    color:var(--ink); transition:opacity .22s ease;
    background-color:#C8D8E6;
    background-image:
      linear-gradient(rgba(106,141,171,.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(106,141,171,.12) 1px, transparent 1px);
    background-size:28px 28px;
    padding: 5% 6%;
    aspect-ratio: 1376 / 768;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .slide-html.fading{ opacity:0; }

  /* summary slide internals */
  .sum-header{ margin-bottom:3%; }
  .sum-eyebrow{
    font-family:"JetBrains Mono",monospace; font-size:clamp(9px,1vw,12px);
    letter-spacing:.14em; text-transform:uppercase; color:var(--brand-ink); margin-bottom:1.5%;
    display:flex; align-items:center; gap:10px;
  }
  .sum-eyebrow::before{ content:""; display:inline-block; width:18px; height:2px; background:var(--brand); }
  .sum-title{
    font-family:"Noto Sans TC","Inter",sans-serif;
    font-size:clamp(16px,2.8vw,32px); font-weight:700; color:var(--ink); line-height:1.15;
  }
  .sum-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:2.5%; flex:1; }
  .sum-col{
    background:rgba(255,255,255,0.55); border:1px solid rgba(106,141,171,.25);
    border-radius:8px; padding:3% 3.5%; display:flex; flex-direction:column;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  .sum-col-head{
    font-family:"JetBrains Mono",monospace; font-size:clamp(8px,0.9vw,11px);
    letter-spacing:.1em; text-transform:uppercase; color:var(--brand-ink);
    border-bottom:1px solid rgba(106,141,171,.2); padding-bottom:8%; margin-bottom:8%;
  }
  .sum-col ul{ list-style:none; padding:0; flex:1; overflow:hidden; }
  .sum-col li{
    font-size:clamp(9px,1vw,12.5px); color:var(--ink);
    padding:3% 0; border-bottom:1px solid rgba(106,141,171,.1);
    display:flex; align-items:flex-start; gap:6%; line-height:1.4;
  }
  .sum-col li:last-child{ border-bottom:none; }
  .sum-col li::before{ content:"›"; color:var(--brand); font-weight:700; flex:none; margin-top:1px; }
  .sum-footer{
    margin-top:3%; padding-top:2.5%; border-top:1px solid rgba(106,141,171,.2);
    font-family:"JetBrains Mono",monospace; font-size:clamp(8px,0.85vw,11px);
    color:var(--muted); text-align:center; letter-spacing:.06em;
  }

  /* Arrow buttons */
  .arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,0.85); border:1px solid var(--hairline);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--ink); box-shadow:0 2px 8px rgba(44,58,74,.12);
    transition:all .15s ease; z-index:5;
  }
  .arrow:hover{ background:#fff; border-color:var(--brand); color:var(--brand); }
  .arrow:disabled{ opacity:.3; cursor:default; }
  .arrow:disabled:hover{ background:rgba(255,255,255,0.85); border-color:var(--hairline); color:var(--ink); }
  .arrow-prev{ left:-22px; }
  .arrow-next{ right:-22px; }

  /* Progress */
  .progress-bar{ width:100%; max-width:900px; height:3px; background:var(--hairline); border-radius:2px; margin:14px 0; }
  .progress-fill{ height:100%; background:var(--brand); border-radius:2px; transition:width .3s ease; }

  /* Nav row */
  .nav-row{ display:flex; align-items:center; gap:12px; width:100%; max-width:900px; margin-bottom:24px; }
  .btn{
    font-family:inherit; font-size:14px; font-weight:500; cursor:pointer;
    border:1px solid var(--hairline); background:var(--surface); color:var(--ink);
    padding:9px 18px; border-radius:10px; transition:all .15s ease;
    display:inline-flex; align-items:center; gap:7px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .btn:hover{ border-color:var(--brand); color:var(--brand-ink); }
  .btn:disabled{ opacity:.35; cursor:default; }
  .btn-spacer{ flex:1; }
  .btn-fs{ font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--muted); padding:9px 14px; }

  /* Thumbnails */
  .thumb-section{ width:100%; max-width:900px; }
  .thumb-label{ font-family:"JetBrains Mono",monospace; font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .thumb-strip{ display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; }
  .thumb{
    position:relative; cursor:pointer;
    border:2px solid var(--hairline); border-radius:8px; overflow:hidden;
    transition:all .15s ease; background:var(--slide-bg);
  }
  .thumb:hover{ border-color:var(--brand); transform:translateY(-2px); box-shadow:var(--shadow); }
  .thumb.active{ border-color:var(--brand); box-shadow:0 0 0 2px var(--brand); }
  .thumb img{ width:100%; height:auto; display:block; }
  .thumb-html-preview{
    width:100%; aspect-ratio:1376/768; background:#C8D8E6;
    display:flex; align-items:center; justify-content:center;
    font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--brand-ink);
    text-align:center; padding:8%;
  }
  .thumb-no{ position:absolute; bottom:0; left:0; right:0; font-family:"JetBrains Mono",monospace; font-size:10px; background:rgba(24,25,44,.6); color:#fff; text-align:center; padding:2px 0; }

  .key-hint{ text-align:center; font-family:"JetBrains Mono",monospace; font-size:11.5px; color:var(--muted); margin:16px 0 32px; }
  .key{ display:inline-block; border:1px solid var(--hairline); padding:1px 7px; border-radius:4px; background:rgba(255,255,255,0.6); }
  .swipe-hint{ display:none; text-align:center; font-family:"JetBrains Mono",monospace; font-size:11.5px; color:var(--muted); margin:16px 0 32px; letter-spacing:.04em; }
  @media(max-width:640px){ .swipe-hint{ display:block; } }

  /* Overlay patches for slide 13 */
  .ovr-layer{ position:absolute; inset:0; pointer-events:none; }
  .ovr-patch{
    position:absolute;
    font-family:"Noto Sans TC","Inter",system-ui,sans-serif;
    font-size:clamp(9px,1.1vw,14px); line-height:1.6;
    padding:4% 5%; border-radius:8px;
  }
  .ovr-patch b{
    display:block; font-size:clamp(10px,1.25vw,16px); font-weight:700;
    margin-bottom:6%; letter-spacing:.02em;
  }
  .ovr-box-green{
    background:rgba(211,227,238,0.93); border:1px solid rgba(106,141,171,.5);
    color:#2C3A4A; box-shadow:0 2px 12px rgba(44,58,74,.1);
  }
  .ovr-box-green b{ color:#456882; border-bottom:1px solid rgba(106,141,171,.3); padding-bottom:5%; }
  .ovr-box-red{
    background:rgba(228,221,239,0.93); border:1px solid rgba(139,126,175,.5);
    color:#2C3A4A; box-shadow:0 2px 12px rgba(44,58,74,.1);
  }
  .ovr-box-red b{ color:#6B5F8F; border-bottom:1px solid rgba(139,126,175,.3); padding-bottom:5%; }

  @media(max-width:640px){
    /* topbar */
    .topbar{ padding:10px 14px; gap:10px; }
    .topbar-title{ font-size:15px; }
    .back-btn span{ display:none; }
    /* stage */
    .stage{ padding:16px 12px 10px; }
    .arrow-prev{ left:-10px; } .arrow-next{ right:-10px; }
    .arrow{ width:36px; height:36px; }
    /* nav row */
    .nav-row{ gap:8px; margin-bottom:16px; }
    .btn{ padding:8px 12px; font-size:13px; gap:5px; }
    .btn-fs{ padding:8px 10px; }
    /* thumbnails */
    .thumb-strip{ grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); }
    /* key hint — keyboard nav irrelevant on mobile; show swipe tip instead */
    .key-hint{ display:none; }
    /* summary slide columns */
    .sum-grid{ grid-template-columns:1fr; }
    /* cover slide */
    .cov-deco{ display:none; }
    .cov-sub br{ display:none; }
    .cov-pills{ gap:6px; }
    .cov-pill{ padding:2% 4%; }
    .cov-corner{ display:none; }
  }
  @media(max-width:400px){
    .topbar-title{ display:none; }
    .stage{ padding:12px 8px 8px; }
    .arrow-prev{ left:-6px; } .arrow-next{ right:-6px; }
    .btn svg{ display:none; }
  }
  @media(prefers-reduced-motion:reduce){
    .slide-box,.slide-html,.thumb,.progress-fill{ transition:none; }
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="back-btn" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    <span>返回首頁</span>

</header>

<main class="stage">
  <div class="slide-wrap">
    <button class="arrow arrow-prev" id="prev" aria-label="上一張" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div id="slide-area"></div>
    <button class="arrow arrow-next" id="next" aria-label="下一張">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    </button>
    <span class="btn-spacer"></span>
    <button class="btn btn-fs" id="btn-fs">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>

  </div>

  <div class="thumb-section">
    <p class="thumb-label">所有投影片</p>
    <div class="thumb-strip" id="thumbs"></div>
  </div>

  <p class="key-hint">
    <span class="key">←</span> <span class="key">→</span> 方向鍵切換 &nbsp;·&nbsp;
    <span class="key">Home</span> 第一張 &nbsp;·&nbsp;
    <span class="key">End</span> 最後一張 &nbsp;·&nbsp;
    <span class="key">F</span> 全螢幕
  </p>
  <p class="swipe-hint">← 左右滑動切換投影片 →</p>
</main>

<script>
(function(){
  // ── Slide definitions ──

  // type 'img' = PNG slide; type 'html' = inline HTML slide
  const SLIDES = [

    { type:'img', src:'slides/image2.png',  alt:'獲利的三大基石與生存鐵律' },

    { type:'img', src:'slides/image6.png',  alt:'技術武器庫總覽：指標層級與戰略定位' },

    { type:'img', src:'slides/image8.png',  alt:'季線核心戰法一：生命線突破的大賺策略' },
    { type:'img', src:'slides/image9.png',  alt:'季線核心戰法二：強勢股的趨勢波段操作' },
    { type:'img', src:'slides/image10.png', alt:'季線核心戰法三：反向利用主力的甩轎洗盤' },
    { type:'img', src:'slides/image11.png', alt:'MACD 中期動能：零軸戰法與柱狀圖訊號' },
    { type:'img', src:'slides/image12.png', alt:'KD 震盪指標：買賣輔助的專屬溫度計' },
    {
      type:'img', src:'slides/image13.png', alt:'基本面盲點破解：除權息行情背後的大戶邏輯',

    {
      type:'html', alt:'總結',
      html:`
        <div class="slide-html" id="html-slide">
          <div class="sum-header">
            <div class="sum-eyebrow">股票交易戰術指南 · 總結</div>
            <div class="sum-title">三大支柱 × 核心紀律</div>

              <ul>
                <li>道氏理論：僅在多頭方向操作，以次要趨勢找交易點</li>
                <li>波浪理論：在第 2、4、C 波修正回檔 50% 處買黑K</li>
                <li>慣性理論：高點過前高、低點不過前低，回檔 20% 布局</li>
                <li>均線多頭排列：短線在上、長線在下，是進場先決條件</li>
                <li>季線（60MA）= 多空生命線，跌破無條件賣出</li>
                <li>MACD：綠柱轉紅柱買，紅柱轉綠柱賣，需搭配均線使用</li>
                <li>KD：溫度計輔助工具，K&lt;20 超賣、K&gt;80 超買</li>
              </ul>
            </div>
            <div class="sum-col">
              <div class="sum-col-head">02 · 季線三大戰法</div>
              <ul>
                <li>戰法一 突破：K 線由下往上突破季線即買，跌破即賣</li>
                <li>戰法二 回測：強勢股靠近季線時買進，跌破停損</li>
                <li>戰法三 洗盤：長黑急跌破季線時逆向買進，設 -10% 嚴格停損</li>
                <li>年線（240MA）用於挑選股票，只做年線向上的個股</li>
                <li>Step 1 確立年線方向 → Step 2 均線多頭排列 + MACD 紅柱 → Step 3 找買點 → Step 4 設定 -10% 停損 +20% 停利</li>
              </ul>
            </div>
            <div class="sum-col">
              <div class="sum-col-head">03 · 資金與心理</div>
              <ul>
                <li>大數法則：務實停損 10%，在數學上徹底切斷大賠</li>
                <li>停利 20% ＞ 停損 10%，長期累積「大賺小賠」</li>
                <li>絕不猜測頭部與底部，只順趨勢操作</li>
                <li>基本面篩選：EPS 正成長 + 能發現金股息 = 防黑字倒閉</li>
                <li>除權息策略：除息前 2 個月布局，除息前 1 天賣出，賺免稅價差</li>
                <li>大盤過高時分批減碼：跌破 5 日線 -25%、10 日線 -50%、月線清倉</li>
                <li>趨勢不容易形成，一旦形成便不容易改變</li>
              </ul>
            </div>
          </div>
          <div class="sum-footer">知識淬鍊與戰術手冊 · 技術 × 資金 × 心理 = 獲利黃金三角</div>
        </div>`
    }
  ];

  const TOTAL = SLIDES.length;
  let cur = 0, transitioning = false;
  const areaEl   = document.getElementById('slide-area');
  const counter  = document.getElementById('counter');
  const progress = document.getElementById('progress');
  const prevArr  = document.getElementById('prev');
  const nextArr  = document.getElementById('next');
  const btnPrev  = document.getElementById('btn-prev');
  const btnNext  = document.getElementById('btn-next');
  const thumbBox = document.getElementById('thumbs');

  // Build thumbnails
  SLIDES.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'thumb' + (i === 0 ? ' active' : '');
    if (s.type === 'img'){
      d.innerHTML = `<img src="${s.src}" alt="${s.alt}" loading="lazy"><span class="thumb-no">${i+1}</span>`;
    } else {
      d.innerHTML = `<div class="thumb-html-preview">${s.alt}</div><span class="thumb-no">${i+1}</span>`;
    }
    d.addEventListener('click', () => goTo(i));
    thumbBox.appendChild(d);
  });

  function renderSlide(idx){
    const s = SLIDES[idx];
    if (s.type === 'img'){
      const box = document.createElement('div');
      box.className = 'slide-box';
      const img = document.createElement('img');
      img.className = 'slide-img';
      img.src = s.src;
      img.alt = s.alt;
      box.appendChild(img);
      // overlays
      if (s.overlays && s.overlays.length){
        const layer = document.createElement('div');
        layer.className = 'ovr-layer';
        s.overlays.forEach(o => {
          const p = document.createElement('div');
          p.className = 'ovr-patch ' + o.cls;
          p.style.left = o.x; p.style.top = o.y;
          p.style.width = o.w; p.style.height = o.h;
          if (o.html) p.innerHTML = o.html;
          else { p.style.whiteSpace = 'pre-line'; p.textContent = o.text || ''; }
          layer.appendChild(p);
        });
        box.appendChild(layer);
      }
      return box;
    } else {
      const wrap = document.createElement('div');
      wrap.innerHTML = s.html;
      return wrap.firstElementChild;
    }
  }

  function goTo(idx, instant){
    if (idx === cur && areaEl.children.length) return;
    if (transitioning && !instant) return;
    transitioning = true;
    const current = areaEl.firstElementChild;
    if (current) current.classList.add('fading');
    setTimeout(() => {
      areaEl.innerHTML = '';
      cur = idx;
      areaEl.appendChild(renderSlide(cur));
      update();
      transitioning = false;
    }, instant ? 0 : 180);
  }

  function update(){
    counter.textContent = `${cur+1} / ${TOTAL}`;
    progress.style.width = `${(cur+1)/TOTAL*100}%`;
    prevArr.disabled = btnPrev.disabled = cur === 0;
    nextArr.disabled = btnNext.disabled = cur === TOTAL-1;
    document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i === cur));
    const active = thumbBox.children[cur];
    if (active) active.scrollIntoView({behavior:'smooth', block:'nearest', inline:'nearest'});
  }

  prevArr.addEventListener('click', () => { if(cur>0) goTo(cur-1); });
  nextArr.addEventListener('click', () => { if(cur<TOTAL-1) goTo(cur+1); });
  btnPrev.addEventListener('click', () => { if(cur>0) goTo(cur-1); });
  btnNext.addEventListener('click', () => { if(cur<TOTAL-1) goTo(cur+1); });

  document.addEventListener('keydown', e => {
    if(e.key==='ArrowLeft'||e.key==='ArrowUp')  { e.preventDefault(); if(cur>0) goTo(cur-1); }
    if(e.key==='ArrowRight'||e.key==='ArrowDown'){ e.preventDefault(); if(cur<TOTAL-1) goTo(cur+1); }
    if(e.key==='Home'){ e.preventDefault(); goTo(0, true); }
    if(e.key==='End') { e.preventDefault(); goTo(TOTAL-1, true); }
    if(e.key.toLowerCase()==='f') toggleFs();
  });

  document.getElementById('btn-fs').addEventListener('click', toggleFs);
  function toggleFs(){
    const el = document.querySelector('.slide-wrap');
    if(!document.fullscreenElement){
      (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    }
  }

  // Touch swipe
  let touchX = null;
  document.getElementById('slide-area').addEventListener('touchstart', e=>{ touchX=e.touches[0].clientX; });
  document.getElementById('slide-area').addEventListener('touchend', e=>{
    if(touchX===null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if(Math.abs(dx)>40){ if(dx<0&&cur<TOTAL-1) goTo(cur+1); if(dx>0&&cur>0) goTo(cur-1); }
    touchX=null;
  });

  // Init
  areaEl.appendChild(renderSlide(0));
  update();
})();
</script>
</body>
</html>
