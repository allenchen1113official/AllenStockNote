<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票交易戰術指南 · 投影片</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #E2E8F0;
    --grid:      #D2DCE8;
    --surface:   rgba(255,255,255,0.80);
    --ink:       #2C3A4A;
    --muted:     #7A8EA6;
    --hairline:  #BEC9D6;
    --brand:     #6A8DAB;
    --brand-ink: #456882;
    --brand-soft:#D3E3EE;
    --shadow:    0 1px 3px rgba(44,58,74,.06), 0 14px 36px -10px rgba(44,58,74,.16);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%; font-family:"Inter",system-ui,"Noto Sans TC",sans-serif;
    color:var(--ink); -webkit-font-smoothing:antialiased;
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:28px 28px;
    background-attachment:fixed;
  }

  /* ── Top bar ── */
  .topbar{
    display:flex; align-items:center; gap:16px;
    padding:14px 24px; background:var(--surface);
    border-bottom:1px solid var(--hairline);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    position:sticky; top:0; z-index:10;
  }
  .back-btn{
    display:inline-flex; align-items:center; gap:7px;
    font-family:"JetBrains Mono",monospace; font-size:12px;
    color:var(--brand-ink); text-decoration:none; letter-spacing:.04em;
    padding:6px 12px; border:1px solid var(--hairline); border-radius:8px;
    background:var(--surface); transition:border-color .15s;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .back-btn:hover{ border-color:var(--brand); }
  .topbar-title{
    font-family:"Fraunces",serif; font-weight:500; font-size:18px;
    flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .counter-badge{
    font-family:"JetBrains Mono",monospace; font-size:12.5px;
    color:var(--muted); white-space:nowrap;
  }

  /* ── Main stage ── */
  .stage{
    display:flex; flex-direction:column; align-items:center;
    padding:28px 24px 16px; min-height:calc(100vh - 57px);
  }

  /* Slide frame */
  .slide-wrap{
    width:100%; max-width:900px; position:relative;
    user-select:none;
  }
  .slide-img{
    width:100%; height:auto; display:block;
    border-radius:12px; box-shadow:var(--shadow);
    border:1px solid var(--hairline);
    transition:opacity .22s ease;
  }
  .slide-img.fading{ opacity:0; }

  /* Arrow buttons overlaid on slide */
  .arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,0.82); border:1px solid var(--hairline);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--ink); box-shadow:0 2px 8px rgba(44,58,74,.12);
    transition:all .15s ease; z-index:2;
  }
  .arrow:hover{ background:#fff; border-color:var(--brand); color:var(--brand); }
  .arrow:disabled{ opacity:.3; cursor:default; }
  .arrow:disabled:hover{ background:rgba(255,255,255,0.82); border-color:var(--hairline); color:var(--ink); }
  .arrow-prev{ left:-22px; }
  .arrow-next{ right:-22px; }

  /* Progress bar */
  .progress-bar{
    width:100%; max-width:900px; height:3px;
    background:var(--hairline); border-radius:2px; margin:14px 0;
  }
  .progress-fill{
    height:100%; background:var(--brand); border-radius:2px;
    transition:width .3s ease;
  }

  /* Nav row */
  .nav-row{
    display:flex; align-items:center; gap:12px;
    width:100%; max-width:900px; margin-bottom:24px;
  }
  .btn{
    font-family:inherit; font-size:14px; font-weight:500; cursor:pointer;
    border:1px solid var(--hairline); background:var(--surface); color:var(--ink);
    padding:9px 18px; border-radius:10px; transition:all .15s ease;
    display:inline-flex; align-items:center; gap:7px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .btn:hover{ border-color:var(--brand); color:var(--brand-ink); }
  .btn:disabled{ opacity:.35; cursor:default; }
  .btn-spacer{ flex:1; }
  .btn-fs{
    font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--muted);
    padding:9px 14px;
  }

  /* Thumbnail strip */
  .thumb-section{ width:100%; max-width:900px; }
  .thumb-label{
    font-family:"JetBrains Mono",monospace; font-size:11.5px;
    letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
    margin-bottom:12px;
  }
  .thumb-strip{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr));
    gap:8px;
  }
  .thumb{
    position:relative; cursor:pointer;
    border:2px solid var(--hairline); border-radius:8px; overflow:hidden;
    transition:all .15s ease; background:#fff;
  }
  .thumb:hover{ border-color:var(--brand); transform:translateY(-2px); box-shadow:var(--shadow); }
  .thumb.active{ border-color:var(--brand); box-shadow:0 0 0 2px var(--brand); }
  .thumb img{ width:100%; height:auto; display:block; }
  .thumb-no{
    position:absolute; bottom:0; left:0; right:0;
    font-family:"JetBrains Mono",monospace; font-size:10px;
    background:rgba(44,58,74,.55); color:#fff;
    text-align:center; padding:2px 0;
  }

  /* Keyboard hint */
  .key-hint{
    text-align:center; font-family:"JetBrains Mono",monospace;
    font-size:11.5px; color:var(--muted); margin:16px 0 32px;
  }
  .key{ display:inline-block; border:1px solid var(--hairline);
    padding:1px 7px; border-radius:4px; background:rgba(255,255,255,0.6); }

  @media(max-width:640px){
    .arrow-prev{ left:-12px; } .arrow-next{ right:-12px; }
    .arrow{ width:36px; height:36px; }
    .thumb-strip{ grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); }
  }
  @media(prefers-reduced-motion:reduce){
    .slide-img,.thumb,.progress-fill{ transition:none; }
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="back-btn" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    返回首頁
  </a>
  <span class="topbar-title">股票交易戰術指南</span>
  <span class="counter-badge" id="counter">1 / 15</span>
</header>

<main class="stage">

  <!-- Slide -->
  <div class="slide-wrap">
    <button class="arrow arrow-prev" id="prev" aria-label="上一張" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <img class="slide-img" id="slide-img" src="slides/image1.png" alt="投影片 1">
    <button class="arrow arrow-next" id="next" aria-label="下一張">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:6.67%"></div></div>

  <!-- Nav row -->
  <div class="nav-row">
    <button class="btn" id="btn-prev" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>上一張
    </button>
    <span class="btn-spacer"></span>
    <button class="btn btn-fs" id="btn-fs" title="全螢幕">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      全螢幕
    </button>
    <span class="btn-spacer"></span>
    <button class="btn" id="btn-next">
      下一張<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <!-- Thumbnails -->
  <div class="thumb-section">
    <p class="thumb-label">所有投影片</p>
    <div class="thumb-strip" id="thumbs"></div>
  </div>

  <p class="key-hint">
    <span class="key">←</span> <span class="key">→</span> 方向鍵切換 &nbsp;·&nbsp;
    <span class="key">Home</span> 第一張 &nbsp;·&nbsp;
    <span class="key">End</span> 最後一張 &nbsp;·&nbsp;
    <span class="key">F</span> 全螢幕
  </p>

</main>

<script>
(function(){
  const TOTAL = 15;
  let cur = 0;
  let transitioning = false;

  const imgEl    = document.getElementById('slide-img');
  const counter  = document.getElementById('counter');
  const progress = document.getElementById('progress');
  const prevArrow = document.getElementById('prev');
  const nextArrow = document.getElementById('next');
  const btnPrev  = document.getElementById('btn-prev');
  const btnNext  = document.getElementById('btn-next');
  const thumbBox = document.getElementById('thumbs');

  // Build thumbnails
  for (let i = 0; i < TOTAL; i++){
    const d = document.createElement('div');
    d.className = 'thumb' + (i === 0 ? ' active' : '');
    d.innerHTML = `<img src="slides/image${i+1}.png" alt="投影片 ${i+1}" loading="lazy">
                   <span class="thumb-no">${i+1}</span>`;
    d.addEventListener('click', () => goTo(i));
    thumbBox.appendChild(d);
  }

  function goTo(idx, instant){
    if (idx === cur) return;
    if (transitioning && !instant) return;
    transitioning = true;
    imgEl.classList.add('fading');
    setTimeout(() => {
      cur = idx;
      imgEl.src = `slides/image${cur+1}.png`;
      imgEl.alt = `投影片 ${cur+1}`;
      imgEl.classList.remove('fading');
      update();
      transitioning = false;
    }, instant ? 0 : 180);
  }

  function update(){
    counter.textContent = `${cur+1} / ${TOTAL}`;
    progress.style.width = `${(cur+1)/TOTAL*100}%`;
    prevArrow.disabled = btnPrev.disabled = cur === 0;
    nextArrow.disabled = btnNext.disabled = cur === TOTAL-1;
    document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i === cur));
    // Scroll active thumb into view
    const active = thumbBox.children[cur];
    if (active) active.scrollIntoView({behavior:'smooth', block:'nearest', inline:'nearest'});
  }

  prevArrow.addEventListener('click', () => { if (cur > 0) goTo(cur-1); });
  nextArrow.addEventListener('click', () => { if (cur < TOTAL-1) goTo(cur+1); });
  btnPrev.addEventListener('click',   () => { if (cur > 0) goTo(cur-1); });
  btnNext.addEventListener('click',   () => { if (cur < TOTAL-1) goTo(cur+1); });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp')  { e.preventDefault(); if(cur>0) goTo(cur-1); }
    if (e.key === 'ArrowRight'|| e.key === 'ArrowDown') { e.preventDefault(); if(cur<TOTAL-1) goTo(cur+1); }
    if (e.key === 'Home') { e.preventDefault(); goTo(0, true); }
    if (e.key === 'End')  { e.preventDefault(); goTo(TOTAL-1, true); }
    if (e.key.toLowerCase() === 'f') toggleFs();
  });

  // Fullscreen
  document.getElementById('btn-fs').addEventListener('click', toggleFs);
  function toggleFs(){
    const el = document.querySelector('.slide-wrap');
    if (!document.fullscreenElement){
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }

  // Touch swipe
  let touchX = null;
  imgEl.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  imgEl.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40){
      if (dx < 0 && cur < TOTAL-1) goTo(cur+1);
      if (dx > 0 && cur > 0) goTo(cur-1);
    }
    touchX = null;
  });

  update();
})();
</script>
</body>
</html>
