  .side-label{ font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted); }
  .card-text{
    flex:1; display:flex; align-items:center;
    font-size:clamp(19px, 2.6vw, 23px); line-height:1.5; white-space:pre-wrap;
  }
  .face-front .card-text{ font-weight:500; }
  .card-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:14px; }
  .tag{ font-family:"JetBrains Mono", monospace; font-size:11px; color:var(--muted);
    border:1px solid var(--hairline); padding:2px 8px; border-radius:5px; }
  .flip-hint{ font-family:"JetBrains Mono", monospace; font-size:11px; color:var(--muted);
    margin-top:14px; display:flex; align-items:center; gap:6px; }
  .status-flag{ position:absolute; top:0; left:28px; transform:translateY(-50%);
    font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.06em;
    padding:3px 10px; border-radius:6px; display:none; }
  .card.s-known .status-flag.flag-known{ display:block; background:var(--brand); color:#fff; }
  .card.s-review .status-flag.flag-review{ display:block; background:var(--review); color:#fff; }

  /* nav + actions */
  .nav-row{ display:flex; align-items:center; gap:10px; width:100%; max-width:560px; }
  .counter{ font-family:"JetBrains Mono", monospace; font-size:13px; color:var(--muted);
    flex:1; text-align:center; }
  .btn{
    font-family:inherit; font-size:14px; font-weight:500; cursor:pointer;
    border:1px solid var(--hairline); background:var(--surface); color:var(--ink);
    padding:10px 14px; border-radius:10px; transition:all .15s ease;
    display:inline-flex; align-items:center; gap:7px;
  }
  .btn:hover{ border-color:var(--ink); }
  .btn:focus-visible{ outline:2px solid var(--brand); outline-offset:2px; }
  .btn-icon{ padding:10px 12px; }
  .actions{ display:flex; gap:10px; }
  .btn-known[aria-pressed="true"]{ background:var(--brand); border-color:var(--brand); color:#fff; }
  .btn-review[aria-pressed="true"]{ background:var(--review); border-color:var(--review); color:#fff; }
  .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .dot-known{ background:var(--brand); }
  .dot-review{ background:var(--review); }

  .toolbar{ display:flex; gap:10px; justify-content:center; margin-top:4px; flex-wrap:wrap; }
  .btn-ghost{ background:transparent; border-color:transparent; color:var(--muted); font-size:13px; padding:6px 10px; }
  .btn-ghost:hover{ color:var(--ink); border-color:var(--hairline); }

  /* ---------- Browse grid ---------- */
  .browse{ margin:46px 0 60px; }
  .browse-head{ display:flex; align-items:baseline; gap:12px; margin-bottom:16px;
    border-top:1px solid var(--hairline); padding-top:26px; }
  .browse-head h2{ font-family:"Fraunces", serif; font-weight:500; font-size:22px; margin:0; }
  .browse-count{ font-family:"JetBrains Mono", monospace; font-size:13px; color:var(--muted); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:12px; }
  .mini{
    text-align:left; background:var(--surface); border:1px solid var(--hairline);
    border-radius:12px; padding:14px 15px; cursor:pointer; font-family:inherit;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    transition:all .15s ease; position:relative; overflow:hidden;
  }
  .mini:hover{ border-color:var(--brand); transform:translateY(-2px); box-shadow:var(--shadow); }
  .mini:focus-visible{ outline:2px solid var(--brand); outline-offset:2px; }
  .mini::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:transparent; }
  .mini.s-known::before{ background:var(--brand); }
  .mini.s-review::before{ background:var(--review); }
  .mini-cat{ font-family:"JetBrains Mono", monospace; font-size:10.5px; color:var(--muted);
    text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:6px; }
  .mini-front{ font-size:14.5px; font-weight:500; margin-top:7px; line-height:1.45;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

  .empty{ text-align:center; color:var(--muted); padding:50px 0; font-size:15px; }
  .empty b{ color:var(--ink); }

  footer{ text-align:center; color:var(--muted); font-size:12.5px; padding:0 0 40px;
    font-family:"JetBrains Mono", monospace; }

  @media (max-width:560px){
    .top{ padding:28px 0 18px; }
    .head-row{ align-items:flex-start; }
    .face{ padding:22px 20px; }
    .card{ min-height:280px; }
    .actions .btn span{ display:none; }
    .actions .btn{ padding:10px 14px; }
  }
  @media (prefers-reduced-motion: reduce){
    .card{ transition:none; }
    .mini:hover{ transform:none; }
    .ring-fg{ transition:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <p class="eyebrow" id="eyebrow">複習卡片</p>
    <div class="head-row">
      <div>
        <h1 id="course-title">複習卡片</h1>
        <p class="subtitle" id="course-subtitle"></p>
      </div>
      <div class="progress">
        <div class="ring-wrap">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle class="ring-bg" cx="32" cy="32" r="27"></circle>
            <circle class="ring-fg" id="ring-fg" cx="32" cy="32" r="27"></circle>
          </svg>
          <div class="ring-num" id="ring-num">0%</div>
        </div>
        <div class="progress-label">
          <b id="known-count">0</b> / <span id="total-count">0</span> 已熟悉<br>
          <span id="review-count">0</span> 張待複習
        </div>
      </div>
    </div>
  </header>

  <section class="controls">
    <div class="search-box">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input id="search" type="search" placeholder="搜尋卡片內容、標籤…" autocomplete="off">
    </div>
    <div class="chips" id="category-chips"></div>
  </section>

  <section class="stage" id="stage">
    <div class="card-scene">
      <div class="card" id="card" role="button" tabindex="0" aria-label="卡片，點擊翻面">
        <span class="status-flag flag-known">已熟悉</span>
        <span class="status-flag flag-review">待複習</span>
        <div class="face face-front">
          <div class="card-meta">
            <span class="card-cat" id="f-cat"></span>
            <span class="card-no" id="f-no"></span>
          </div>
          <div class="card-text" id="f-front"></div>
          <div class="card-tags" id="f-tags"></div>
          <div class="flip-hint">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9 9 0 0 1 6.7 3"></path><path d="M21 3v5h-5"></path></svg>
            點一下或按空白鍵翻面
          </div>
        </div>
        <div class="face face-back">
          <div class="card-meta">
            <span class="side-label">答案 / 解釋</span>
            <span class="card-no" id="b-no"></span>
          </div>
          <div class="card-text" id="b-back"></div>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn btn-icon" id="prev" aria-label="上一張">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
      </button>
      <div class="actions">
        <button class="btn btn-review" id="mark-review" aria-pressed="false">
          <span class="dot dot-review"></span><span>待複習</span>
        </button>
        <button class="btn btn-known" id="mark-known" aria-pressed="false">
          <span class="dot dot-known"></span><span>已熟悉</span>
        </button>
      </div>
      <button class="btn btn-icon" id="next" aria-label="下一張">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
      </button>
    </div>
    <div class="counter" id="counter">0 / 0</div>

    <div class="toolbar">
      <button class="btn-ghost btn" id="shuffle">🔀 隨機排列</button>
      <button class="btn-ghost btn" id="reset">↺ 清除我的進度</button>
    </div>
  </section>

  <section class="browse">
    <div class="browse-head">
      <h2>全部卡片</h2>
      <span class="browse-count" id="browse-count"></span>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <footer>靜態複習網站 · 進度儲存於本機瀏覽器</footer>
</div>

<script>
(function(){
  "use strict";

  // ---- normalise data ----
  const deck = CARDS.map((c, i) => ({
    id: "c" + i + "_" + slug(c.front),
    category: c.category || "未分類",
    front: c.front || "",
    back: c.back || "",
    tags: Array.isArray(c.tags) ? c.tags : []
  }));
  function slug(s){ return String(s).replace(/\s+/g,"").slice(0,12); }

  const STORE_KEY = "reviewcards::" + (COURSE.title || "default");
  let status = loadStatus();          // { id: "known" | "review" }
  let view = deck.slice();            // filtered + ordered list shown in study mode
  let pos = 0;
  let activeCat = "全部";
  let query = "";
  let flipped = false;

  // ---- header ----
  document.title = COURSE.title || "複習卡片";
  document.getElementById("eyebrow").textContent = COURSE.title || "複習卡片";
  document.getElementById("course-title").textContent = COURSE.title || "複習卡片";
  const sub = document.getElementById("course-subtitle");
  if (COURSE.subtitle) sub.textContent = COURSE.subtitle; else sub.style.display = "none";
  document.getElementById("total-count").textContent = deck.length;

  // ---- category chips ----
  const cats = ["全部", ...Array.from(new Set(deck.map(c => c.category)))];
  const chipBox = document.getElementById("category-chips");
  cats.forEach(cat => {
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = cat;
    b.setAttribute("aria-pressed", cat === "全部" ? "true" : "false");
    b.addEventListener("click", () => { activeCat = cat; syncChips(); applyFilter(); });
    chipBox.appendChild(b);
  });
  // review-only toggle
  const revChip = document.createElement("button");
  revChip.className = "chip chip-review"; revChip.textContent = "只看待複習";
  revChip.setAttribute("aria-pressed", "false");
  let reviewOnly = false;
  revChip.addEventListener("click", () => {
    reviewOnly = !reviewOnly;
    revChip.setAttribute("aria-pressed", reviewOnly ? "true" : "false");
    applyFilter();
  });
  const spacer = document.createElement("span"); spacer.className = "chip-spacer";
  chipBox.appendChild(spacer); chipBox.appendChild(revChip);

  function syncChips(){
    Array.from(chipBox.querySelectorAll(".chip")).forEach(c => {
      if (c === revChip || c === spacer) return;
      c.setAttribute("aria-pressed", c.textContent === activeCat ? "true" : "false");
    });
  }

  // ---- search ----
  document.getElementById("search").addEventListener("input", e => {
    query = e.target.value.trim().toLowerCase();
    applyFilter();
  });

  function matches(c){
    if (activeCat !== "全部" && c.category !== activeCat) return false;
    if (reviewOnly && status[c.id] !== "review") return false;
    if (query){
      const hay = (c.front + " " + c.back + " " + c.tags.join(" ") + " " + c.category).toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  }

  function applyFilter(){
    const keepId = view[pos] ? view[pos].id : null;
    view = deck.filter(matches);
    const newIdx = view.findIndex(c => c.id === keepId);
    pos = newIdx >= 0 ? newIdx : 0;
    flipped = false;
    renderCard();
    renderGrid();
  }

  // ---- study card ----
  const cardEl = document.getElementById("card");
  function renderCard(){
    if (!view.length){
      document.getElementById("stage").querySelector(".card-scene").style.opacity = ".4";
      document.getElementById("f-front").textContent = "沒有符合的卡片";
      document.getElementById("f-cat").textContent = "—";
      document.getElementById("f-no").textContent = "";
      document.getElementById("b-back").textContent = "";
      document.getElementById("f-tags").innerHTML = "";
      document.getElementById("counter").textContent = "0 / 0";
      cardEl.className = "card";
      setPressed("mark-known", false); setPressed("mark-review", false);
      return;
    }
    document.getElementById("stage").querySelector(".card-scene").style.opacity = "1";
    const c = view[pos];
    document.getElementById("f-cat").textContent = c.category;
    document.getElementById("f-front").textContent = c.front;
    document.getElementById("b-back").textContent = c.back;
    document.getElementById("f-no").textContent = pad(pos+1) + " / " + pad(view.length);
    document.getElementById("b-no").textContent = pad(pos+1) + " / " + pad(view.length);
    const tagBox = document.getElementById("f-tags");
    tagBox.innerHTML = "";
    c.tags.forEach(t => { const s = document.createElement("span"); s.className="tag"; s.textContent="#"+t; tagBox.appendChild(s); });
    document.getElementById("counter").textContent = (pos+1) + " / " + view.length;

    cardEl.className = "card" + (flipped ? " is-flipped" : "");
    const st = status[c.id];
    if (st === "known") cardEl.classList.add("s-known");
    if (st === "review") cardEl.classList.add("s-review");
    setPressed("mark-known", st === "known");
    setPressed("mark-review", st === "review");
  }
  function pad(n){ return String(n).padStart(2,"0"); }
  function setPressed(id, on){ document.getElementById(id).setAttribute("aria-pressed", on ? "true":"false"); }

  function flip(){ if(!view.length) return; flipped = !flipped; cardEl.classList.toggle("is-flipped", flipped); }
  function go(delta){
    if(!view.length) return;
    pos = (pos + delta + view.length) % view.length;
    flipped = false; renderCard();
  }

  cardEl.addEventListener("click", flip);
  cardEl.addEventListener("keydown", e => {
    if (e.key === " " || e.key === "Enter"){ e.preventDefault(); flip(); }
  });
  document.getElementById("prev").addEventListener("click", () => go(-1));
  document.getElementById("next").addEventListener("click", () => go(1));

  function mark(kind){
    if(!view.length) return;
    const c = view[pos];
    if (status[c.id] === kind) delete status[c.id]; else status[c.id] = kind;
    saveStatus();
    if (reviewOnly) applyFilter(); else { renderCard(); renderGrid(); }
    updateProgress();
  }
  document.getElementById("mark-known").addEventListener("click", () => mark("known"));
  document.getElementById("mark-review").addEventListener("click", () => mark("review"));

  // ---- keyboard shortcuts ----
  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "ArrowLeft") go(-1);
    else if (e.key === "ArrowRight") go(1);
    else if (e.key === " " || e.key === "Enter"){ if(e.target===document.body){ e.preventDefault(); flip(); } }
    else if (e.key.toLowerCase() === "k") mark("known");
    else if (e.key.toLowerCase() === "r") mark("review");
  });

  // ---- shuffle / reset ----
  document.getElementById("shuffle").addEventListener("click", () => {
    for (let i = view.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [view[i], view[j]] = [view[j], view[i]];
    }
    pos = 0; flipped = false; renderCard();
  });
  document.getElementById("reset").addEventListener("click", () => {
    if (!confirm("確定清除你在這台裝置上的所有複習進度？")) return;
    status = {}; saveStatus(); applyFilter(); updateProgress();
  });

  // ---- browse grid ----
  function renderGrid(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    document.getElementById("browse-count").textContent = view.length + " 張";
    if (!view.length){
      grid.innerHTML = '<div class="empty">找不到符合條件的卡片。<br>試試清除搜尋或切換分類。</div>';
      return;
    }
    view.forEach((c, i) => {
      const b = document.createElement("button");
      b.className = "mini";
      const st = status[c.id];
      if (st) b.classList.add("s-" + st);
      b.innerHTML =
        '<div class="mini-cat">' +
          (st ? '<span class="dot dot-'+st+'"></span>' : '') +
          esc(c.category) +
        '</div><div class="mini-front">' + esc(c.front) + '</div>';
      b.addEventListener("click", () => {
        pos = i; flipped = false; renderCard();
        document.getElementById("stage").scrollIntoView({behavior:"smooth", block:"center"});
      });
      grid.appendChild(b);
    });
  }
  function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

  // ---- progress ring ----
  const RING_C = 2 * Math.PI * 27;
  document.getElementById("ring-fg").style.strokeDasharray = RING_C;
  function updateProgress(){
    const known = deck.filter(c => status[c.id] === "known").length;
    const review = deck.filter(c => status[c.id] === "review").length;
    const pct = deck.length ? Math.round(known / deck.length * 100) : 0;
    document.getElementById("ring-fg").style.strokeDashoffset = RING_C * (1 - known / (deck.length||1));
    document.getElementById("ring-num").textContent = pct + "%";
    document.getElementById("known-count").textContent = known;
    document.getElementById("review-count").textContent = review;
  }

  // ---- persistence ----
  function loadStatus(){
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function saveStatus(){
    try { localStorage.setItem(STORE_KEY, JSON.stringify(status)); } catch(e){}
  }

  // ---- init ----
  applyFilter();
  updateProgress();
})();
</script>
</body>
</html>
